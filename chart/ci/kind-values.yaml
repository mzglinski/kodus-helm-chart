# Chart-testing install values (kind cluster with ci/services operators).

externalPostgresql:
  host: postgres-pooler-rw
  database: kodus_db
  username: kodus
  existingSecret: kodus-db-credentials
  passwordKey: password

externalMongodb:
  host: mongodb-svc
  database: kodus
  username: kodus
  authSource: admin
  existingSecret: kodus-db-credentials
  passwordKey: mongo-password

externalRabbitmq:
  host: rabbitmq
  vhost: kodus-ai
  username: kodus
  existingSecret: rabbitmq-credentials
  passwordKey: password

ingress:
  web:
    hostname: kodus.example.com
  api:
    hostname: api.kodus.example.com

global:
  logLevel: error

jobs:
  seeds:
    enabled: false

secrets:
  existingSecret: kodus-app-secrets
