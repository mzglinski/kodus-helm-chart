# Chart lives at chart/ (not chart/<name>/). ct requires charts to be direct
# children of chart-dirs, so use the repo root here.
chart-dirs:
  - .

check-version-increment: true

target-branch: main

# ct lints and installs the chart once per chart/ci/*-values.yaml file
# (kind-values.yaml). chart/ci/lint.yaml is deliberately named outside that
# glob; it is used by the explicit `helm template` CI step and local checks.
