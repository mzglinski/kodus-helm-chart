apiVersion: v1
kind: Secret
metadata:
  name: postgres-auth-secret
type: Opaque
stringData:
  username: kodus
  password: ci-postgres-password
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-auth-secret
type: Opaque
stringData:
  password: ci-mongo-password
---
apiVersion: v1
kind: Secret
metadata:
  name: kodus-db-credentials
type: Opaque
stringData:
  password: ci-postgres-password
  mongo-password: ci-mongo-password
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
type: Opaque
stringData:
  username: kodus
  password: ci-rabbitmq-password
  default_user.conf: |
    default_user = kodus
    default_pass = ci-rabbitmq-password
  host: rabbitmq
  port: "5672"
  provider: rabbitmq
  type: rabbitmq
---
apiVersion: v1
kind: Secret
metadata:
  name: kodus-app-secrets
type: Opaque
stringData:
  jwt-secret: Y2ktdGVzdC1qd3Qtc2VjcmV0LXRoaXJ0eS1jaGFycy1sb25n
  jwt-refresh-secret: Y2ktdGVzdC1qd3QtcmVmcmVzaC1zZWNyZXQtY2hhcnMtbG9uZw==
  crypto-key: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  code-management-secret: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
  code-management-webhook-token: ci-webhook-token
  nextauth-secret: Y2ktdGVzdC1uZXh0YXV0aC1zZWNyZXQtY2hhcnMtbG9uZw==
  rabbitmq-uri: amqp://kodus:ci-rabbitmq-password@rabbitmq:5672/kodus-ai?heartbeat=60&frameMax=8192
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
spec:
  instances: 1
  # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-system-trixie
  postgresql:
    extensions:
      - name: pgvector
        image:
          # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/pgvector
          reference: ghcr.io/cloudnative-pg/pgvector:0.8.2-18-trixie
  bootstrap:
    initdb:
      database: kodus_db
      owner: kodus
      secret:
        name: postgres-auth-secret
  storage:
    size: 1Gi
  affinity:
    enablePodAntiAffinity: false
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: postgres-pooler-rw
spec:
  cluster:
    name: postgres
  instances: 1
  type: rw
  pgbouncer:
    poolMode: transaction
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: kodus-db
spec:
  name: kodus_db
  owner: kodus
  cluster:
    name: postgres
  extensions:
    - name: vector
---
# MongoDB Community Operator workload identity (matches kodus-deployment operators).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mongodb-kubernetes-appdb
  labels:
    app.kubernetes.io/name: mongodb
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mongodb-kubernetes-appdb
  labels:
    app.kubernetes.io/name: mongodb
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
  - apiGroups: [""]
    resources: [pods]
    verbs: [patch, delete, get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mongodb-kubernetes-appdb
  labels:
    app.kubernetes.io/name: mongodb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mongodb-kubernetes-appdb
subjects:
  - kind: ServiceAccount
    name: mongodb-kubernetes-appdb
    namespace: default
---
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: mongodb
spec:
  members: 1
  type: ReplicaSet
  # renovate: datasource=docker depName=quay.io/mongodb/mongodb-community-server
  version: "8.0.12"
  security:
    authentication:
      modes: ["SCRAM"]
  users:
    - name: kodus
      db: admin
      passwordSecretRef:
        name: mongodb-auth-secret
        key: password
      roles:
        - name: readWrite
          db: kodus
        - name: dbAdmin
          db: kodus
      scramCredentialsSecretName: mongodb-kodus-scram
  statefulSet:
    spec:
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi
      template:
        spec:
          serviceAccountName: mongodb-kubernetes-appdb
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  memory: 1Gi
            - name: mongodb-agent
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  memory: 512Mi
---
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: rabbitmq
  labels:
    app.kubernetes.io/name: rabbitmq
spec:
  replicas: 1
  # renovate: datasource=docker depName=rabbitmq
  # rabbitmq_delayed_message_exchange requires RabbitMQ <4.3 (Mnesia removed in 4.3).
  image: rabbitmq:4.2.6-management
  rabbitmq:
    additionalPlugins:
      - rabbitmq_delayed_message_exchange
  secretBackend:
    externalSecret:
      name: rabbitmq-credentials
  override:
    statefulSet:
      spec:
        template:
          spec:
            initContainers:
              - name: download-delayed-plugin
                # renovate: datasource=docker depName=curlimages/curl
                image: curlimages/curl:8.12.1
                command:
                  - sh
                  - -c
                  - |
                    set -euo pipefail
                    curl -fsSL -o /plugins/rabbitmq_delayed_message_exchange.ez \
                      "https://github.com/rabbitmq/rabbitmq-delayed-message-exchange/releases/download/v4.2.0/rabbitmq_delayed_message_exchange-4.2.0.ez"
                    echo "f168b2c09810cde3726961d31f38e3408e6a7fbff3929908d6f962061d8e70a1  /plugins/rabbitmq_delayed_message_exchange.ez" | sha256sum -c -
                volumeMounts:
                  - name: community-plugins
                    mountPath: /plugins
            containers:
              - name: rabbitmq
                env:
                  - name: RABBITMQ_PLUGINS_DIR
                    value: /opt/rabbitmq/plugins:/community-plugins
                volumeMounts:
                  - name: community-plugins
                    mountPath: /community-plugins
            volumes:
              - name: community-plugins
                emptyDir: {}
