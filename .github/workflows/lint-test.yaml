name: Lint and Test Charts

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    paths:
      - "chart/**"
      - "ct.yaml"
      - ".github/workflows/lint-test.yaml"
      - "Makefile"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Reject manual chart version bumps
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          if [ "${RUNNER_DEBUG:-0}" = "1" ]; then set -x; fi

          if [[ "${{ github.head_ref }}" == release-please--* ]]; then
            echo "Release Please PR; chart version changes are allowed."
            exit 0
          fi

          target_branch="${{ github.event.repository.default_branch }}"
          old_version="$(git show "origin/${target_branch}:chart/Chart.yaml" | awk '/^version:/{print $2; exit}')"
          new_version="$(awk '/^version:/{print $2; exit}' chart/Chart.yaml)"

          if [[ "${old_version}" != "${new_version}" ]]; then
            echo "::error::chart/Chart.yaml version must not change in this PR (was ${old_version}, now ${new_version}). Release Please manages chart version bumps."
            exit 1
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          # renovate: datasource=github-releases depName=helm/helm
          version: v4.2.2

      - uses: actions/setup-python@v6
        with:
          # chart-testing/yamale is not Python 3.14-ready yet; keep in sync with chart-testing-action.
          python-version: "3.14"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Install helm-docs
        run: |
          # renovate: datasource=github-releases depName=norwoodj/helm-docs
          curl -fsSL https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz | tar xz
          sudo mv helm-docs /usr/local/bin/

      - name: Verify helm-docs is up to date
        run: make docs-check

      - name: Run chart-testing (lint)
        run: ct lint --config ct.yaml --target-branch ${{ github.event.repository.default_branch }}

      - name: Helm template (lint values)
        run: helm template kodus chart -f chart/ci/lint.yaml

  install-test:
    name: Install test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          # renovate: datasource=github-releases depName=helm/helm
          version: v4.2.2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0

      - name: Install CloudNativePG operator
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo update
          # renovate: datasource=helm depName=cloudnative-pg registryUrl=https://cloudnative-pg.github.io/charts
          helm install cnpg cnpg/cloudnative-pg --namespace cnpg-system --create-namespace --version 0.29.0 --wait --timeout 5m

      - name: Install MongoDB Community Operator
        run: |
          helm repo add mongodb https://mongodb.github.io/helm-charts
          helm repo update
          # renovate: datasource=helm depName=community-operator registryUrl=https://mongodb.github.io/helm-charts
          helm install mongodb-operator mongodb/community-operator \
            --namespace mongodb \
            --create-namespace \
            --version 0.13.0 \
            --set operator.watchNamespace='*' \
            --wait \
            --timeout 5m

      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          # renovate: datasource=helm depName=cert-manager registryUrl=https://charts.jetstack.io
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version v1.17.2 \
            --set crds.enabled=true \
            --wait \
            --timeout 5m

      - name: Install RabbitMQ Cluster Operator
        run: |
          set -euo pipefail
          if [ "${RUNNER_DEBUG:-0}" = "1" ]; then set -x; fi
          # renovate: datasource=github-releases depName=rabbitmq/cluster-operator
          kubectl apply -f https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.1/cluster-operator.yml
          kubectl -n rabbitmq-system wait --for=condition=ready pod -l app.kubernetes.io/name=rabbitmq-cluster-operator --timeout=300s

      - name: Deploy CI dependencies
        run: |
          kubectl apply -f chart/ci/services/deps.yaml
          bash chart/ci/wait-for-deps.sh default

      - name: Run chart-testing (install)
        run: ct install --config ct.yaml --debug --namespace default --target-branch ${{ github.event.repository.default_branch }} --helm-extra-args "--timeout 300s"
