# Default values for the Kodus Helm chart.
# Stateful services (PostgreSQL, MongoDB, RabbitMQ) must be provisioned externally.
# See chart/README.md (generated by helm-docs) for the full values reference.

nameOverride: ""
fullnameOverride: ""

image:
  registry: ghcr.io/kodustech
  # -- Container image tag for all Kodus components.
  # @default -- .Chart.AppVersion
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

global:
  nodeEnv: production
  databaseEnv: production
  databaseDisableSsl: true
  logLevel: error
  logPretty: false
  rabbitmqEnabled: true
  mcpServerEnabled: false
  # Self-hosted opt-in for beta-stage features (installer: BETA_FEATURES).
  betaFeatures: false
  # Opt out of the daily self-hosted telemetry heartbeat (telemetry.kodus.io).
  telemetryDisabled: true
  # Optional heartbeat receiver override (installer: KODUS_TELEMETRY_ENDPOINT).
  telemetryEndpoint: ""
  # Default pod termination grace for non-worker components (seconds).
  terminationGracePeriodSeconds: 30
  # Chart-wide pod security defaults (images run as UID 1000).
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []
  pod:
    annotations: {}
    labels: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []

# Non-secret application configuration (self-hosted installer defaults).
config:
  globalApiContainerName: kodus_api
  rateMaxRequest: 100
  rateInterval: 1000
  jwtExpiresIn: 365d
  jwtRefreshExpiresIn: 7d
  developmentMode: false
  agentReviewEnabled: true
  rabbitmqWait: true
  workerDrainTimeoutMs: 600000
  docs:
    enabled: false
    path: /docs
    specPath: /openapi.json
    basicUser: ""
  sandbox:
    provider: local
  email:
    provider: resend
    userInviteBaseUrl: ""
    smtp:
      host: ""
      port: 587
      secure: ""
      user: ""
      from: noreply@notifications.kodus.io
  workflow:
    workerPrefetch: 20
    publisherPrefetch: 5
    webhookPrefetch: 20
    codeReviewPrefetch: 20
    webhookProcessTimeoutMs: 600000
    codeReviewProcessTimeoutMs: 7200000
    outboxMaxAttempts: 10
  cron:
    syncCodeReviewReactions: "0 0 * * *"
    kodyLearning: "0 0 * * 6"
    checkIfPrShouldBeApproved: "*/2 * * * *"
    orgReport: "0 9 1 * *"
    repoReport: "0 9 1,16 * *"
    spendLimitAlert: "0 * * * *"
    staleReviewWatchdog: "*/30 * * * *"
    ssoTestSessionCleanup: "0 1 * * *"
    classifyOrphanedSessions: "0 */15 * * * *"
    kodyRulesDetectorSweepEnabled: true
  analytics:
    pgSchema: analytics
    pgPoolMax: 5
    ingestionCron: "*/30 * * * *"
    ingestionDisabled: false
    ingestionRunOnBoot: true
    classifierCron: "*/15 * * * *"
    classifierDisabled: false
  github:
    # GitHub App numeric App ID (API_GITHUB_APP_ID).
    appId: ""
    # GitHub App Client ID (GLOBAL_GITHUB_CLIENT_ID, API_GITHUB_CLIENT_SECRET pairing). Not the same as appId.
    clientId: ""
    # GitHub OAuth App Client ID for NextAuth sign-in (WEB_OAUTH_GITHUB_CLIENT_ID). Falls back to clientId when empty.
    webOAuthClientId: ""
    # Installation URL, e.g. https://github.com/apps/<slug>/installations/new
    installUrl: ""
  web:
    nodeEnv: self-hosted
    supportDocsUrl: https://docs.kodus.io
    supportDiscordInviteUrl: https://discord.gg/QFzwwmNmdN
    supportTalkToFounderUrl: https://cal.com/gabrielmalinosqui/30min
    helpdeskHostname: ""
    helpdeskPort: 3004
    ruleFilesDocs: https://docs.kodus.io/how_to_use/en/code_review/configs/rules_file_detection
    tokenDocs:
      github: https://docs.kodus.io/how_to_use/en/code_review/general_config/github_pat
      gitlab: https://docs.kodus.io/how_to_use/en/code_review/general_config/gitlab_pat
      bitbucket: https://docs.kodus.io/how_to_use/en/code_review/general_config/bitbucket_pat
      azureRepos: https://docs.kodus.io/how_to_use/en/code_review/general_config/azure_devops_pat
      forgejo: https://docs.kodus.io/how_to_use/en/code_review/general_config/forgejo_pat

llm:
  # Concrete model ID for self-hosted env-mode LLM (e.g. gpt-4o, claude-sonnet-4-6, gemini-2.5-pro, kimi-k2.6).
  # "auto" disables env-mode LLM — code reviews will not run until a model + API key are configured.
  providerModel: auto
  # OpenAI-compatible base URL (OpenAI, Moonshot/Kimi proxy, vLLM, etc.).
  openaiForceBaseUrl: ""
  # Force temperature for every LLM call (e.g. "1" for reasoning models).
  temperatureOverride: ""
  # Comma-separated baseURL substrings trusted for json_schema structured output.
  trustJsonSchemaBaseUrls: ""
  google:
    # gemini (AI Studio) or vertex (Vertex AI service-account JSON, base64).
    provider: gemini
    vertexLocation: us-central1
  groq:
    baseUrl: https://api.groq.com/openai/v1
  cerebras:
    baseUrl: https://api.cerebras.ai/v1

workerAnalytics:
  # Enterprise analytics worker (installer: COMPOSE_PROFILES=analytics worker-analytics).
  enabled: false
  replicaCount: 1
  role: analytics
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  resources: {}

mcpManager:
  # Deployed when global.mcpServerEnabled is true (installer: kodus-mcp-manager service).
  enabled: true
  port: 3101
  nodeEnv: production
  databaseEnv: production
  logLevel: info
  corsOrigins: "*"
  mcpProviders: kodusmcp,composio,custom
  pgSchema: mcp-manager
  composioBaseUrl: https://backend.composio.dev/api/v3
  redirectUri: ""
  replicaCount: 1
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  resources: {}

api:
  enabled: true
  replicaCount: 1
  autoscaling:
    enabled: false
    minReplicas:  # defaults to replicaCount when autoscaling is enabled
    maxReplicas: 10
    # targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
    stabilizationWindowSeconds: 0
  port: 3001
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  resources: {}

worker:
  enabled: true
  replicaCount: 1
  # HTTP health probe port (WORKER_HEALTH_PORT; apps/worker exposes /health).
  healthPort: 3334
  # Align with API_WORKER_DRAIN_TIMEOUT_MS (default 600000ms) plus buffer.
  terminationGracePeriodSeconds: 660
  autoscaling:
    enabled: false
    minReplicas:  # defaults to replicaCount when autoscaling is enabled
    maxReplicas: 10
    # targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
    stabilizationWindowSeconds: 0
  role: code-review
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  resources: {}

webhooks:
  enabled: true
  replicaCount: 1
  autoscaling:
    enabled: false
    minReplicas:  # defaults to replicaCount when autoscaling is enabled
    maxReplicas: 10
    # targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
    stabilizationWindowSeconds: 0
  port: 3332
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  resources: {}

web:
  enabled: true
  replicaCount: 1
  autoscaling:
    enabled: false
    minReplicas:  # defaults to replicaCount when autoscaling is enabled
    maxReplicas: 10
    # targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
    stabilizationWindowSeconds: 0
  port: 3000
  # In-cluster hostname for server-side API proxy requests (defaults to the api Service name).
  apiHostname: ""
  # In-cluster hostname for MCP Manager (defaults to the mcp-manager Service name).
  mcpManagerHostname: ""
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  resources: {}

# Optionally run @nestjs/schedule crons on dedicated single-replica Deployments so HA
# api/worker/webhooks replicas do not fire duplicate schedules. Disabled by default —
# crons run in the main api/worker pods (fine for replicaCount: 1).
# When enabled, each cronRunner.<component>.enabled flag controls whether that component's
# crons move to a dedicated pod (leap-day schedule on the HA Deployment) or stay put.
cronRunner:
  enabled: false
  # Standard 5-field cron (minute hour dom month dow). Feb 29 only — next run is a leap year.
  disabledSchedule: "0 0 29 2 *"
  # 6-field cron (second minute hour dom month dow) for API_CRON_CLASSIFY_ORPHANED_SESSIONS.
  disabledScheduleWithSeconds: "0 0 0 29 2 *"
  api:
    enabled: true
    replicaCount: 1
    resources: {}
  worker:
    enabled: true
    replicaCount: 1
    role: code-review
    resources: {}
  workerAnalytics:
    enabled: false
    replicaCount: 1
    role: analytics
    resources: {}

externalPostgresql:
  # Alternative to discrete host/port fields — stored as pg-uri in the app Secret.
  uri: ""
  host: ""
  port: 5432
  database: kodus_db
  username: kodus
  existingSecret: ""
  passwordKey: password

externalMongodb:
  # Alternative to discrete host/port fields — stored as mongo-uri in the app Secret.
  uri: ""
  host: ""
  port: 27017
  database: kodus
  username: kodus
  # Appended to the Mongo URI in production via API_MG_DB_PRODUCTION_CONFIG (e.g. ?authSource=admin).
  authSource: admin
  existingSecret: ""
  passwordKey: mongo-password

externalRabbitmq:
  # Alternative to discrete host fields — stored as rabbitmq-uri in the app Secret.
  uri: ""
  host: ""
  port: 5672
  vhost: kodus-ai
  username: ""
  password: ""
  # Optional Secret with RabbitMQ credentials (usernameKey/passwordKey); chart builds rabbitmq-uri.
  existingSecret: ""
  usernameKey: username
  passwordKey: password

publicUrls:
  api: ""
  web: ""

ingress:
  enabled: true
  className: nginx
  annotations:
    # NextAuth sets large Set-Cookie / session headers; default nginx buffers are too small.
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "256k"
    nginx.ingress.kubernetes.io/large-client-header-buffers: "4 32k"
  # Example TLS automation annotations (not applied by default):
  # annotations:
  #   kubernetes.io/tls-acme: "true"
  #   cert-manager.io/cluster-issuer: cloudflare-prod
  web:
    enabled: true
    hostname: ""
    tls: true
    secretName: ""
  api:
    enabled: true
    hostname: ""
    tls: true
    secretName: ""
    webhookPaths:
      - /github/webhook
      - /gitlab/webhook
      - /bitbucket/webhook
      - /azure-repos/webhook
      - /forgejo/webhook

# Pre-provisioned Kubernetes Secret with application credentials.
# When empty, a pre-install/pre-upgrade hook creates secrets using kodus-installer autogen methods.
# On upgrade, existing keys are preserved via lookup; only missing keys are generated.
# With helm template / Argo CD dry-run, lookup returns empty and hook output shows freshly generated values.
# URI-mode database keys (pg-uri, mongo-uri, rabbitmq-uri) must live in this Secret when secrets.existingSecret is set.
# LLM API keys are never auto-generated — add them to the Secret before install (see README).
secrets:
  existingSecret: ""
  keys:
    openaiApiKey: openai-api-key
    anthropicApiKey: anthropic-api-key
    googleAiApiKey: google-ai-api-key
    geminiApiKey: gemini-api-key
    vertexAiApiKey: vertex-ai-api-key
    novitaAiApiKey: novita-ai-api-key
    moonshotApiKey: moonshot-api-key
    groqApiKey: groq-api-key
    cerebrasApiKey: cerebras-api-key
    openRouterApiKey: open-router-api-key
    morphllmApiKey: morphllm-api-key
    exaKey: exa-key
    resendApiKey: resend-api-key
    smtpPass: smtp-pass
    e2bKey: e2b-key
    apiDocsBasicPass: api-docs-basic-pass
    mcpManagerComposioApiKey: mcp-manager-composio-api-key
    githubAppClientSecret: github-app-client-secret
    webOAuthGithubClientSecret: web-oauth-github-client-secret
    githubAppPrivateKey: github-app-private-key

jobs:
  migrations:
    enabled: true
    backoffLimit: 3
    activeDeadlineSeconds: 1800
    resources: {}
  seeds:
    enabled: true
    backoffLimit: 3
    activeDeadlineSeconds: 600
    resources: {}

serviceAccount:
  # When false (default), workloads use serviceAccount.name or the namespace "default" ServiceAccount.
  create: false
  name: ""
  annotations: {}
  hooks:
    # When serviceAccount.create is true, optionally create a separate ServiceAccount for
    # migration/seed hook Jobs. It is applied as a pre-install/pre-upgrade hook (weight -6)
    # so it exists before migrations run on first install.
    create: false
    name: ""
    annotations: {}
