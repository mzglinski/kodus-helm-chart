name: Build and push Chart

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: main

      - name: Prepare gh-pages worktree
        run: |
          set -euo pipefail
          if [ "${RUNNER_DEBUG:-0}" = "1" ]; then set -x; fi

          repo_url="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          rm -rf gh-pages

          if git ls-remote --heads "$repo_url" gh-pages | grep -q .; then
            git clone --depth=1 --branch gh-pages "$repo_url" gh-pages
          else
            mkdir -p gh-pages/charts
            git -C gh-pages init -b gh-pages
            git -C gh-pages remote add origin "$repo_url"
          fi

          git -C gh-pages config user.email "action@github.com"
          git -C gh-pages config user.name "GitHub Action"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          # renovate: datasource=github-releases depName=helm/helm
          version: v3.16.4

      - name: Package chart
        run: helm package main/chart --destination gh-pages/charts

      - name: Update index
        run: |
          helm repo index gh-pages/charts --url https://mzglinski.github.io/kodus-helm-chart/charts

      - name: Commit and push gh-pages
        working-directory: gh-pages
        run: |
          set -euo pipefail
          if [ "${RUNNER_DEBUG:-0}" = "1" ]; then set -x; fi

          git add .
          git diff --staged --quiet || git commit -m "Publish chart ${GITHUB_REF_NAME}"
          git push -f origin HEAD:gh-pages

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: gh-pages/charts/kodus-*.tgz
