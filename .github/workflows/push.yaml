name: Build and push Chart

on:
  push:
    tags:
      - "v*"

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: main

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Init gh-pages branch
        run: |
          if [ ! -d gh-pages/.git ]; then
            rm -rf gh-pages
            mkdir gh-pages
            cd gh-pages
            git init
            git checkout -b gh-pages
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git config user.email "action@github.com"
            git config user.name "GitHub Action"
            mkdir -p charts
          else
            cd gh-pages
            git config user.email "action@github.com"
            git config user.name "GitHub Action"
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          # renovate: datasource=github-releases depName=helm/helm
          version: v3.16.4

      - name: Package chart
        run: helm package main/chart --destination gh-pages/charts

      - name: Update index
        run: |
          helm repo index gh-pages/charts --url https://mzglinski.github.io/kodus-helm-chart/charts

      - name: Commit and push gh-pages
        working-directory: gh-pages
        run: |
          git add .
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git diff --staged --quiet || git commit -m "Publish chart ${GITHUB_REF_NAME}"
          git push -f origin gh-pages

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: gh-pages/charts/kodus-*.tgz
