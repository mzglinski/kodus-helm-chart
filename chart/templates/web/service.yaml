{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kodus.fullname" . }}-web
  labels:
    {{- include "kodus.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.web.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kodus.componentSelectorLabels" (dict "root" . "component" "web") | nindent 4 }}
{{- end }}
