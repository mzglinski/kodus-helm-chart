{{- if and .Values.global.mcpServerEnabled .Values.mcpManager.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kodus.fullname" . }}-mcp-manager
  labels:
    {{- include "kodus.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-manager
spec:
  replicas: {{ .Values.mcpManager.replicaCount }}
  selector:
    matchLabels:
      {{- include "kodus.componentSelectorLabels" (dict "root" . "component" "mcp-manager") | nindent 6 }}
  template:
    metadata:
      {{- include "kodus.deploymentPodMetadata" (dict "root" . "component" "mcp-manager") | nindent 6 }}
    spec:
      {{- include "kodus.deploymentPodSpec" (dict "root" . "component" "mcp-manager") | nindent 6 }}
      containers:
        - name: mcp-manager
          image: {{ include "kodus.image" (dict "root" . "component" "mcp-manager") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/apps/mcp-manager/main.js"]
          ports:
            - name: http
              containerPort: {{ .Values.mcpManager.port }}
              protocol: TCP
          env:
            {{- include "kodus.mcpManagerEnv" . | nindent 12 }}
          {{- $containerSecurityContext := include "kodus.containerSecurityContext" (dict "root" . "component" "mcp-manager") -}}
          {{- if $containerSecurityContext }}
          securityContext:
            {{- $containerSecurityContext | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.mcpManager.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
{{- end }}
