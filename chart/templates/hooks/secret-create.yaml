{{- if not .Values.secrets.existingSecret }}
{{- $secretName := printf "%s-secrets" (include "kodus.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "kodus.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  jwt-secret: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "jwt-secret" "generator" "kodus.autogen.base64-32" "root" .) | quote }}
  jwt-refresh-secret: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "jwt-refresh-secret" "generator" "kodus.autogen.base64-32" "root" .) | quote }}
  crypto-key: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "crypto-key" "generator" "kodus.autogen.hex32" "root" .) | quote }}
  code-management-secret: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "code-management-secret" "generator" "kodus.autogen.hex32" "root" .) | quote }}
  code-management-webhook-token: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "code-management-webhook-token" "generator" "kodus.autogen.base64url-32" "root" .) | quote }}
  nextauth-secret: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "nextauth-secret" "generator" "kodus.autogen.base64-32" "root" .) | quote }}
  {{- if not .Values.externalPostgresql.existingSecret }}
  pg-password: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "pg-password" "generator" "kodus.autogen.hex32" "root" .) | quote }}
  {{- end }}
  {{- if .Values.externalPostgresql.uri }}
  pg-uri: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "pg-uri" "value" .Values.externalPostgresql.uri "root" .) | quote }}
  {{- end }}
  {{- if not .Values.externalMongodb.existingSecret }}
  mongo-password: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "mongo-password" "generator" "kodus.autogen.hex32" "root" .) | quote }}
  {{- end }}
  {{- if .Values.externalMongodb.uri }}
  mongo-uri: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "mongo-uri" "value" .Values.externalMongodb.uri "root" .) | quote }}
  {{- end }}
  {{- if include "kodus.needsRabbitmqUriSecret" . }}
  rabbitmq-uri: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "rabbitmq-uri" "value" (include "kodus.rabbitmqUri" .) "root" .) | quote }}
  {{- end }}
  {{- if .Values.global.mcpServerEnabled }}
  mcp-manager-jwt-secret: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "mcp-manager-jwt-secret" "generator" "kodus.autogen.base64-32" "root" .) | quote }}
  mcp-manager-encryption-secret: {{ include "kodus.secretKeyOrValueOrAutogen" (dict "secret" $existing "key" "mcp-manager-encryption-secret" "generator" "kodus.autogen.hex32" "root" .) | quote }}
  {{- end }}
{{- end }}
