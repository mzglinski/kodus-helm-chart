{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kodus.fullname" . }}-worker
  labels:
    {{- include "kodus.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kodus.componentSelectorLabels" (dict "root" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      {{- include "kodus.deploymentPodMetadata" (dict "root" . "component" "worker") | nindent 6 }}
    spec:
      {{- include "kodus.deploymentPodSpec" (dict "root" . "component" "worker") | nindent 6 }}
      {{- $extraVolumes := include "kodus.extraVolumes" (dict "root" . "component" "worker") -}}
      {{- if $extraVolumes }}
      volumes:
        {{- $extraVolumes | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "kodus.image" (dict "root" . "component" "worker") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/apps/worker/main.js"]
          env:
            {{- include "kodus.workerEnv" . | nindent 12 }}
            {{- include "kodus.extraEnv" (dict "root" . "component" "worker") | nindent 12 }}
          {{- $containerSecurityContext := include "kodus.containerSecurityContext" (dict "root" . "component" "worker") -}}
          {{- if $containerSecurityContext }}
          securityContext:
            {{- $containerSecurityContext | nindent 12 }}
          {{- end }}
          {{- $extraVolumeMounts := include "kodus.extraVolumeMounts" (dict "root" . "component" "worker") -}}
          {{- if $extraVolumeMounts }}
          volumeMounts:
            {{- $extraVolumeMounts | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- include "kodus.workerProbes" . | nindent 10 }}
{{- end }}
