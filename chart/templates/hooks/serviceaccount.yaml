{{- if and .Values.serviceAccount.create .Values.serviceAccount.hooks.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kodus.hooksServiceAccountName" . }}
  labels:
    {{- include "kodus.labels" . | nindent 4 }}
    app.kubernetes.io/component: hooks
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-6"
    helm.sh/resource-policy: keep
    {{- with .Values.serviceAccount.hooks.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
